<section
  id="contacts"
  class="section section--blue section--pattern-blue contacts"
>
  <div class="container contacts__inner section__inner">
    <h2 class="contacts__title heading">Contact Me</h2>
    <p class="contacts__subtitle">
      Fill out the short form below, and I'll get in touch as soon as possible.
      Thank you!
    </p>

    <form class="contacts-form" action="#" method="post">
      <label class="contacts-form__label">
        <span class="visually-hidden">Full name</span>
        <input
          class="contacts-form__input"
          type="text"
          name="full-name"
          placeholder="Enter your full name*"
          required
        />
      </label>
      <label class="contacts-form__label">
        <span class="visually-hidden">Phone number</span>
        <input
          class="contacts-form__input"
          type="tel"
          name="phone"
          placeholder="Enter your phone number*"
          required
        />
      </label>
      <label class="contacts-form__label">
        <span class="visually-hidden">Email</span>
        <input
          class="contacts-form__input"
          type="email"
          name="email"
          placeholder="Enter your e-mail*"
          required
        />
      </label>
      <label class="contacts-form__label">
        <span class="visually-hidden">Message</span>
        <textarea
          class="contacts-form__textarea"
          name="message"
          placeholder="Type your message"
        ></textarea>
      </label>
      <button class="button button--submit" type="submit">Submit</button>
    </form>
  </div>
</section>
