<section id="gallery" class="section section--white gallery">
  <div class="container gallery__inner section__inner">
    <h2 class="gallery__title heading">Gallery</h2>
    <p class="gallery__subtitle">Explore my latest design work</p>

    <!-- Gallery Carousel -->
    <div class="gallery-carousel" aria-label="Image gallery">
      <button
        class="gallery-carousel__control gallery-carousel__control--prev"
        type="button"
        aria-label="Previous images"
      >
        ‹
      </button>

      <div class="gallery-carousel__viewport">
        <div class="gallery-carousel__track">
          <!-- Cards will be generated by JavaScript -->
        </div>
      </div>

      <button
        class="gallery-carousel__control gallery-carousel__control--next"
        type="button"
        aria-label="Next images"
      >
        ›
      </button>
    </div>
  </div>
</section>

<!-- Gallery Modal -->
<div class="gallery-modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="gallery-modal__backdrop"></div>
  <div class="gallery-modal__dialog">
    <button
      class="gallery-modal__close"
      aria-label="Close gallery"
      type="button"
    >
      ✕
    </button>

    <button
      class="gallery-modal__nav gallery-modal__nav--prev"
      type="button"
      aria-label="Previous image"
    >
      ‹
    </button>

    <div class="gallery-modal__content">
      <img class="gallery-modal__image" src="" alt="" />
      <h3 class="gallery-modal__title"></h3>
    </div>

    <button
      class="gallery-modal__nav gallery-modal__nav--next"
      type="button"
      aria-label="Next image"
    >
      ›
    </button>
  </div>
</div>
